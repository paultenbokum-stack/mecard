let currentScreen = 0;

function render() {
  const s = screens[currentScreen];
  document.getElementById('screen-content').innerHTML = s.html;
  document.getElementById('annotations').innerHTML = s.annotation;
  document.getElementById('screen-label').textContent = s.title;
  document.getElementById('prev-btn').disabled = currentScreen === 0;
  document.getElementById('next-btn').disabled = currentScreen === screens.length - 1;
}

function nav(dir) {
  const next = currentScreen + dir;
  if (next >= 0 && next < screens.length) {
    currentScreen = next;
    render();
  }
}
