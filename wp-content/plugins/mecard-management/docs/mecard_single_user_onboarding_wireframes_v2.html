  }

  .mecard-wireframes button:disabled {

  }

  .mecard-wireframes #annotations {
    background: var(--color-background-primary);

  }

  .mecard-wireframes #annotations ul {
    margin-top: 0;
    margin-bottom: 0;
  }

  document.getElementById('prev-btn').disabled = currentScreen === 0;

}

function nav(dir) {
  const next = currentScreen + dir;

    currentScreen = next;
    render();

}
